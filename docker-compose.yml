version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: agrismart-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=agrismart
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agrismart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: agrismart-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=agrismart
      - REDIS_URL=redis://redis:6379
      - APP_ENV=production
      - CORS_ORIGINS=http://localhost:3000,http://localhost
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-agrismart-docker-secret-key-2026}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: agrismart-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
  backend_uploads:
